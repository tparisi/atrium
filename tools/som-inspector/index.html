<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atrium — SOM Inspector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #111;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Toolbar ───────────────────────────────────────── */
  .toolbar {
    background: #1e1e1e;
    border-bottom: 1px solid #333;
    padding: 7px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .toolbar h1 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #a78bfa;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .toolbar input[type="text"] {
    flex: 1;
    background: #111;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e2e8f0;
    padding: 5px 10px;
    font-size: 13px;
    min-width: 0;
  }
  .toolbar input[type="text"]:focus { outline: none; border-color: #a78bfa; }

  .toolbar .ws-label {
    font-size: 12px;
    color: #64748b;
    flex-shrink: 0;
  }

  button {
    background: #2d2d2d;
    border: 1px solid #444;
    border-radius: 4px;
    color: #e2e8f0;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.1s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  button:hover:not(:disabled) { background: #3a3a3a; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: #5b21b6; border-color: #7c3aed; }
  button.primary:hover:not(:disabled) { background: #6d28d9; }

  .toolbar select {
    background: #2d2d2d;
    border: 1px solid #444;
    border-radius: 4px;
    color: #e2e8f0;
    padding: 5px 8px;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toolbar select:focus { outline: none; border-color: #a78bfa; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #888;
    flex-shrink: 0;
  }
  .status-dot.connected    { background: #5cb85c; }
  .status-dot.connecting   { background: #f0ad4e; }
  .status-dot.error        { background: #d9534f; }

  /* ── Main content area ──────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Left panel ─────────────────────────────────────── */
  .left-panel {
    width: 264px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #2a2a2a;
    background: #141414;
    overflow: hidden;
  }

  .panel-header {
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #475569;
    text-transform: uppercase;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
    background: #181818;
  }

  /* ── Tree view ──────────────────────────────────────── */
  #tree-panel {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 4px 0;
  }

  .tree-item { }

  .tree-row {
    display: flex;
    align-items: center;
    padding: 2px 6px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    color: #94a3b8;
    gap: 2px;
  }
  .tree-row:hover { background: #1a2332; }
  .tree-row.selected { background: #172554; color: #93c5fd; }
  .tree-row.scene-root { color: #475569; cursor: default; font-weight: 600; }

  .tree-toggle {
    flex-shrink: 0;
    width: 14px;
    text-align: center;
    font-size: 9px;
    color: #475569;
    cursor: pointer;
    line-height: 1;
  }
  .tree-toggle:empty { cursor: default; }

  .tree-label {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tree-ephemeral {
    flex-shrink: 0;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #a78bfa;
    margin-left: 4px;
    display: inline-block;
    vertical-align: middle;
    title: 'ephemeral node';
  }

  .tree-children { padding-left: 14px; }

  /* ── World Info panel ──────────────────────────────── */
  #world-info {
    flex-shrink: 0;
    border-bottom: 1px solid #222;
  }

  .world-info-header {
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #64748b;
    text-transform: uppercase;
    background: #1a1a1a;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .world-info-header:hover { background: #202020; color: #94a3b8; }

  .world-info-content {
    padding: 6px 8px 8px;
    overflow-y: auto;
    max-height: 300px;
  }

  .world-info-content input[type="text"] {
    flex: 1;
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 3px;
    color: #cbd5e1;
    padding: 2px 4px;
    font-size: 11px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    min-width: 0;
  }
  .world-info-content input[type="text"]:focus { outline: none; border-color: #4f46e5; }

  .world-info-content .prop-value-text {
    font-size: 11px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    color: #475569;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Property sheet ─────────────────────────────────── */
  #props-panel {
    flex: 0 0 auto;
    max-height: 46%;
    overflow-y: auto;
    border-top: 1px solid #222;
    padding: 4px 8px 10px;
  }

  .prop-node-name {
    font-size: 11px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    color: #64748b;
    padding: 4px 0 6px;
    word-break: break-all;
  }

  .prop-section { margin-bottom: 8px; }

  .prop-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #475569;
    margin-bottom: 4px;
    padding-bottom: 2px;
    border-bottom: 1px solid #1e293b;
  }

  .prop-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 3px;
    font-size: 11px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  .prop-label {
    flex: 0 0 70px;
    color: #64748b;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 10px;
  }

  .prop-inputs {
    display: flex;
    align-items: center;
    gap: 3px;
    flex: 1;
    min-width: 0;
  }

  .prop-inputs input[type="number"] {
    width: 50px;
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 3px;
    color: #cbd5e1;
    padding: 2px 3px;
    font-size: 11px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    flex-shrink: 0;
  }
  .prop-inputs input[type="number"]:focus { outline: none; border-color: #4f46e5; }

  .prop-inputs input[type="checkbox"] {
    accent-color: #a78bfa;
    width: 13px; height: 13px;
    cursor: pointer;
  }

  .prop-inputs input[type="color"] {
    width: 34px; height: 22px;
    padding: 1px 2px;
    border: 1px solid #1e293b;
    border-radius: 3px;
    background: #0f172a;
    cursor: pointer;
    flex-shrink: 0;
  }

  .prop-inputs input[type="range"] {
    flex: 1;
    accent-color: #7c3aed;
    min-width: 0;
    height: 14px;
  }

  .prop-inputs select {
    flex: 1;
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 3px;
    color: #cbd5e1;
    padding: 2px 3px;
    font-size: 11px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    min-width: 0;
  }
  .prop-inputs select:focus { outline: none; border-color: #4f46e5; }

  /* ── Animations panel ──────────────────────────────── */
  #animations-panel {
    flex-shrink: 0;
    border-top: 1px solid #222;
    overflow-y: auto;
    max-height: 240px;
    padding: 4px 0;
  }

  .anim-empty {
    font-size: 11px;
    color: #475569;
    padding: 6px 10px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  .anim-wrapper {
    border-bottom: 1px solid #1a1a1a;
  }
  .anim-wrapper:last-child { border-bottom: none; }

  .anim-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    font-size: 11px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  .anim-triangle {
    flex-shrink: 0;
    width: 12px;
    text-align: center;
    font-size: 9px;
    color: #475569;
    cursor: pointer;
    user-select: none;
    line-height: 1;
  }
  .anim-triangle:hover { color: #94a3b8; }

  .anim-name {
    flex: 1;
    color: #93c5fd;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .anim-duration {
    flex-shrink: 0;
    color: #475569;
    font-size: 10px;
    width: 36px;
    text-align: right;
  }

  .anim-time {
    flex-shrink: 0;
    color: #a78bfa;
    font-size: 10px;
    width: 34px;
    text-align: right;
  }

  .anim-btn {
    padding: 2px 6px;
    font-size: 10px;
    flex-shrink: 0;
    min-width: 22px;
  }
  .anim-btn:disabled { opacity: 0.25; }

  /* ── Animation detail (expanded) ───────────────────── */
  .anim-detail {
    padding: 4px 8px 6px 28px;
    background: #0f0f0f;
    border-top: 1px solid #1a1a1a;
  }

  .anim-fields {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .anim-field-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  .anim-field-label {
    flex: 0 0 90px;
    color: #475569;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .anim-field-value {
    color: #94a3b8;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .anim-field-hint {
    color: #334155;
    font-size: 9px;
    flex-shrink: 0;
  }

  .anim-field-number {
    width: 56px;
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 3px;
    color: #cbd5e1;
    padding: 1px 3px;
    font-size: 10px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }
  .anim-field-number:focus { outline: none; border-color: #4f46e5; }

  .anim-fields input[type="checkbox"] {
    accent-color: #a78bfa;
    width: 12px; height: 12px;
    cursor: pointer;
  }

  /* ── 3D Viewport ────────────────────────────────────── */
  #viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0a0a;
  }
  #viewport canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    pointer-events: none;
    opacity: 0.25;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: #fff;
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

  #status-bar {
    position: absolute;
    bottom: 10px;
    left: 12px;
    font-size: 11px;
    color: #334155;
    pointer-events: none;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  /* ── Drag-and-drop indicator ───────────────────────── */
  #viewport.drag-over {
    outline: 3px dashed #4a9eff;
    outline-offset: -3px;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three":                            "https://esm.sh/three@0.163.0",
    "three/addons/":                    "https://esm.sh/three@0.163.0/addons/",
    "@gltf-transform/core":             "https://esm.sh/@gltf-transform/core@4.3.0",
    "@gltf-transform/extensions":       "https://esm.sh/@gltf-transform/extensions@4.3.0",
    "@gltf-transform/view":             "https://esm.sh/@gltf-transform/view@4.3.0?deps=three@0.163.0,@gltf-transform/core@4.3.0",
    "@atrium/som":                      "../../packages/som/src/index.js",
    "@atrium/protocol":                 "../../packages/protocol/src/index.js",
    "@atrium/client":                   "../../packages/client/src/AtriumClient.js",
    "@atrium/client/AvatarController":      "../../packages/client/src/AvatarController.js",
    "@atrium/client/NavigationController":  "../../packages/client/src/NavigationController.js",
    "@atrium/client/AnimationController":   "../../packages/client/src/AnimationController.js"
  }
}
</script>
</head>
<body>

<div class="toolbar">
  <h1>SOM INSPECTOR</h1>
  <input id="worldUrl" type="text" value="../../tests/fixtures/space.gltf"
         placeholder=".gltf or .atrium.json URL" />
  <button id="loadBtn" class="primary">Load</button>
  <span class="ws-label">Server:</span>
  <input id="wsUrl" type="text" value="ws://localhost:3000" style="width:170px;flex:0 0 auto" />
  <div class="status-dot" id="statusDot"></div>
  <button id="connectBtn">Connect</button>
  <select id="mode-switcher">
    <option value="ORBIT">Orbit</option>
    <option value="WALK">Walk</option>
  </select>
</div>

<div class="main">
  <!-- Left panel -->
  <div class="left-panel">
    <div id="world-info"></div>
    <div class="panel-header">Scene Graph</div>
    <div id="tree-panel"></div>
    <div class="panel-header" id="props-header" style="display:none">Properties</div>
    <div id="props-panel"></div>
    <div class="panel-header">Animations</div>
    <div id="animations-panel"></div>
  </div>

  <!-- 3D Viewport -->
  <div id="viewport">
    <div id="crosshair"></div>
    <div id="status-bar"></div>
  </div>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
