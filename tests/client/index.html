<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATRIUM World Client</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a1a;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #242424;
    border-bottom: 1px solid #333;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    font-size: 13px;
  }
  header h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #a78bfa;
    flex-shrink: 0;
  }

  .conn-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .conn-bar input {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e2e8f0;
    padding: 4px 8px;
    font-size: 12px;
    width: 220px;
  }
  .conn-bar input:focus { outline: none; border-color: #a78bfa; }

  .cam-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .cam-bar label { font-size: 12px; color: #94a3b8; }

  button {
    background: #2d2d2d;
    border: 1px solid #444;
    border-radius: 4px;
    color: #e2e8f0;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.12s;
  }
  button:hover:not(:disabled) { background: #3d3d3d; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: #5b21b6; border-color: #7c3aed; }
  button.primary:hover:not(:disabled) { background: #6d28d9; }
  button.danger  { background: #7f1d1d; border-color: #991b1b; }
  button.danger:hover:not(:disabled)  { background: #991b1b; }

  .status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    margin-left: 6px;
    color: #94a3b8;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
  }
  .status-dot.connected    { background: #34d399; }
  .status-dot.connecting   { background: #fbbf24; }
  .status-dot.error        { background: #f87171; }

  /* ── Main layout ────────────────────────────────── */
  .main {
    display: grid;
    grid-template-columns: 360px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left panel ─────────────────────────────────── */
  .left-panel {
    background: #242424;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    background: #1e1e1e;
    border-bottom: 1px solid #333;
    padding: 7px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
    flex-shrink: 0;
  }

  .send-area {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  .form-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-row label { font-size: 11px; color: #64748b; width: 36px; flex-shrink: 0; }

  select {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e2e8f0;
    padding: 4px 8px;
    font-size: 12px;
  }
  select:focus { outline: none; border-color: #a78bfa; }

  #editor {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #c8d3e8;
    padding: 8px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    resize: none;
    line-height: 1.5;
    min-height: 0;
  }
  #editor:focus { outline: none; border-color: #a78bfa; }
  #editor.error { border-color: #f87171; }

  .error-msg { font-size: 11px; color: #f87171; min-height: 14px; }

  .send-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* ── Right panel ─────────────────────────────────── */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #1a1a1a;
  }

  /* Viewport */
  #viewport {
    flex: 1;
    background: #2a2a2a;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  #viewport canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
  #viewport-overlay {
    position: absolute;
    top: 8px; left: 8px;
    font-size: 11px;
    color: #64748b;
    pointer-events: none;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  /* Log panel */
  .log-panel {
    height: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-top: 1px solid #333;
  }

  .log-header {
    background: #1e1e1e;
    border-bottom: 1px solid #333;
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .log-controls { display: flex; align-items: center; gap: 8px; }
  .log-controls label {
    font-size: 11px;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    color: #94a3b8;
  }

  #log {
    flex: 1;
    overflow-y: auto;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    background: #1e1e1e;
  }

  .log-entry {
    border-bottom: 1px solid #252525;
    cursor: pointer;
    user-select: none;
  }
  .log-entry:hover .log-summary { background: #262626; }
  .log-entry.inbound  .log-summary { border-left: 2px solid #1e4d6b; }
  .log-entry.outbound .log-summary { border-left: 2px solid #1e4d2b; }
  .log-entry.error-entry .log-summary { border-left: 2px solid #7f1d1d; background: #1a1010; }

  .log-summary {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 3px 8px;
    line-height: 1.4;
  }
  .log-ts   { color: #444; width: 64px; flex-shrink: 0; font-size: 10px; }
  .log-dir  { width: 14px; flex-shrink: 0; font-weight: 700; }
  .log-dir.out { color: #4ade80; }
  .log-dir.in  { color: #60a5fa; }
  .log-type { flex-shrink: 0; color: #e2e8f0; }
  .log-detail { flex: 1; color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .log-body {
    display: none;
    background: #111;
    padding: 6px 10px 6px 30px;
    color: #a5b4fc;
    white-space: pre;
    overflow-x: auto;
    border-top: 1px solid #252525;
    font-size: 11px;
  }
  .log-entry.expanded .log-body { display: block; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #1a1a1a; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>ATRIUM</h1>
  <div class="conn-bar">
    <input id="urlInput" type="text" value="ws://localhost:3000" />
    <button id="btnConnect" class="primary">Connect</button>
    <button id="btnDisconnect" disabled>Disconnect</button>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </div>
  <div class="cam-bar">
    <label for="cameraMode">Camera:</label>
    <select id="cameraMode">
      <option value="walk">Walk</option>
      <option value="orbit">Orbit</option>
    </select>
  </div>
</header>

<div class="main">

  <!-- ── Left panel: SOP messaging ── -->
  <div class="left-panel">
    <div class="panel-header">Send Message</div>
    <div class="send-area">
      <div class="form-row">
        <label>Type</label>
        <select id="typeSelect">
          <option>hello</option>
          <option>ping</option>
          <option selected>send</option>
          <option>add</option>
          <option>remove</option>
          <option>view</option>
        </select>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
      <div class="error-msg" id="editorError"></div>
      <div class="send-actions">
        <button id="btnSend" class="primary" disabled>Send</button>
        <button id="btnReset">Reset</button>
      </div>
    </div>
  </div>

  <!-- ── Right panel: viewport + log ── -->
  <div class="right-panel">
    <div id="viewport">
      <div id="viewport-overlay">No scene loaded</div>
    </div>

    <div class="log-panel">
      <div class="log-header">
        Message Log
        <div class="log-controls">
          <label>
            <input type="checkbox" id="chkShowTicks" checked /> Show tick messages
          </label>
          <label>
            <input type="checkbox" id="chkShowViews" /> Show view messages
          </label>
          <button id="btnClear">Clear</button>
        </div>
      </div>
      <div id="log"></div>
    </div>
  </div>

</div>

<script type="module">
// SPDX-License-Identifier: MIT
// Copyright (c) 2026 Tony Parisi / Metatron Studio. See LICENSE in repo root.

import * as THREE from 'https://esm.sh/three@0.163.0'
import { OrbitControls } from 'https://esm.sh/three@0.163.0/addons/controls/OrbitControls.js'
import { WebIO } from 'https://esm.sh/@gltf-transform/core@4.3.0'
import { KHRONOS_EXTENSIONS } from 'https://esm.sh/@gltf-transform/extensions@4.3.0'
import { DocumentView } from 'https://esm.sh/@gltf-transform/view@4.3.0?deps=three@0.163.0'
import { SOMDocument } from '/client/som/index.js'

// ---------------------------------------------------------------------------
// Configuration
// ---------------------------------------------------------------------------
const MANIFEST_PATH = '../fixtures/space.atrium.json'
const FALLBACK_GLTF_PATH = '../fixtures/space.gltf'
const WALK_SPEED = 4                                    // units/second
const WALK_EYE_Y = 1.7                                  // eye height in Walk mode
const LOOK_SENSITIVITY = 0.2 * (Math.PI / 180)         // radians per pixel
const VIEW_THRESHOLD = 0.001                            // min position delta to broadcast

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const clientId = crypto.randomUUID()
let myServerId = null   // server-assigned ID received in hello response

let ws = null
let wsConnected = false
let gltfDoc = null
let som = null
let docView = null
const logEntries = []

// Avatar registry: serverId -> THREE.Group (pure Three.js, not in glTF doc)
const avatars = new Map()

// Camera / walk state
let cameraMode = 'walk'
const keysDown = new Set()
let walkYaw   = 0
let walkPitch = 0
let walkMouseDown = false
let walkLastX = 0
let walkLastY = 0
let lastBroadcastPos = null
let lastFrameTime = performance.now()

// ---------------------------------------------------------------------------
// Message templates
// ---------------------------------------------------------------------------
const TEMPLATES = {
  hello:  () => JSON.stringify({
    type: 'hello', id: clientId, capabilities: { tick: { interval: 1000 } }
  }, null, 2),

  ping: () => JSON.stringify({ type: 'ping', clientTime: Date.now() }, null, 2),

  send: () => JSON.stringify({
    type: 'send', seq: 1, node: 'crate-01', field: 'translation', value: [2.0, 0.25, 0.0]
  }, null, 2),

  add: () => JSON.stringify({
    type: 'add', seq: 1, format: 'gltf',
    node: { name: 'new-node', translation: [0.0, 0.0, 0.0], rotation: [0, 0, 0, 1] }
  }, null, 2),

  remove: () => JSON.stringify({ type: 'remove', seq: 1, node: 'crate-01' }, null, 2),

  view: () => JSON.stringify({ type: 'view', position: [0.0, 1.7, 0.0] }, null, 2),
}

// ---------------------------------------------------------------------------
// DOM refs
// ---------------------------------------------------------------------------
const urlInput      = document.getElementById('urlInput')
const btnConnect    = document.getElementById('btnConnect')
const btnDisconnect = document.getElementById('btnDisconnect')
const statusDot     = document.getElementById('statusDot')
const statusText    = document.getElementById('statusText')
const typeSelect    = document.getElementById('typeSelect')
const editor        = document.getElementById('editor')
const editorError   = document.getElementById('editorError')
const btnSend       = document.getElementById('btnSend')
const btnReset      = document.getElementById('btnReset')
const logEl         = document.getElementById('log')
const btnClear      = document.getElementById('btnClear')
const chkShowTicks  = document.getElementById('chkShowTicks')
const chkShowViews  = document.getElementById('chkShowViews')
const viewportEl    = document.getElementById('viewport')
const overlayEl     = document.getElementById('viewport-overlay')
const cameraModeEl  = document.getElementById('cameraMode')

// ---------------------------------------------------------------------------
// Three.js setup
// ---------------------------------------------------------------------------
const threeScene = new THREE.Scene()
threeScene.background = new THREE.Color(0x2a2a2a)

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000)
camera.position.set(0, 2, 6)
camera.lookAt(0, 0.5, 0)

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.shadowMap.enabled = true
renderer.setPixelRatio(window.devicePixelRatio)
viewportEl.appendChild(renderer.domElement)

const controls = new OrbitControls(camera, renderer.domElement)
controls.target.set(0, 0.5, 0)
controls.update()
switchToWalk()

const ambient = new THREE.AmbientLight(0xffffff, 0.4)
threeScene.add(ambient)

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0)
dirLight.position.set(5, 10, 5)
dirLight.castShadow = true
threeScene.add(dirLight)

const grid = new THREE.GridHelper(10, 10, 0x444444, 0x333333)
threeScene.add(grid)

const resizeObserver = new ResizeObserver(entries => {
  const { width, height } = entries[0].contentRect
  if (width === 0 || height === 0) return
  renderer.setSize(width, height)
  camera.aspect = width / height
  camera.updateProjectionMatrix()
})
resizeObserver.observe(viewportEl)

// ---------------------------------------------------------------------------
// Camera mode switching
// ---------------------------------------------------------------------------
function switchToOrbit() {
  cameraMode = 'orbit'
  controls.enabled = true
}

function switchToWalk() {
  cameraMode = 'walk'
  controls.enabled = false
  camera.position.set(0, WALK_EYE_Y, 3)
  walkYaw   = 0
  walkPitch = 0
  lastBroadcastPos = null
  applyWalkLook()
}

function applyWalkLook() {
  const target = new THREE.Vector3(
    camera.position.x - Math.sin(walkYaw) * Math.cos(walkPitch),
    camera.position.y + Math.sin(walkPitch),
    camera.position.z - Math.cos(walkYaw) * Math.cos(walkPitch)
  )
  camera.lookAt(target)
}

cameraModeEl.addEventListener('change', () => {
  if (cameraModeEl.value === 'walk') switchToWalk()
  else switchToOrbit()
})

// ---------------------------------------------------------------------------
// Walk keyboard input (ignore when textarea/input focused)
// ---------------------------------------------------------------------------
document.addEventListener('keydown', (e) => {
  const tag = document.activeElement?.tagName
  if (tag === 'TEXTAREA' || tag === 'INPUT') return
  keysDown.add(e.key)
})
document.addEventListener('keyup', (e) => {
  keysDown.delete(e.key)
})

// ---------------------------------------------------------------------------
// Walk mouse look (drag in viewport)
// ---------------------------------------------------------------------------
viewportEl.addEventListener('mousedown', (e) => {
  if (cameraMode !== 'walk') return
  walkMouseDown = true
  walkLastX = e.clientX
  walkLastY = e.clientY
})

window.addEventListener('mousemove', (e) => {
  if (!walkMouseDown || cameraMode !== 'walk') return
  const dx = e.clientX - walkLastX
  const dy = e.clientY - walkLastY
  walkLastX = e.clientX
  walkLastY = e.clientY
  walkYaw   -= dx * LOOK_SENSITIVITY
  walkPitch -= dy * LOOK_SENSITIVITY
  const MAX_PITCH = 80 * Math.PI / 180
  walkPitch = Math.max(-MAX_PITCH, Math.min(MAX_PITCH, walkPitch))
})

window.addEventListener('mouseup', () => { walkMouseDown = false })

// ---------------------------------------------------------------------------
// Walk movement (per frame)
// ---------------------------------------------------------------------------
function updateWalk(dt) {
  const sinYaw = Math.sin(walkYaw)
  const cosYaw = Math.cos(walkYaw)
  // Forward (-Z rotated by yaw) and right (+X rotated by yaw)
  const fwdX = -sinYaw, fwdZ = -cosYaw
  const rgtX =  cosYaw, rgtZ = -sinYaw

  let dx = 0, dz = 0
  if (keysDown.has('w') || keysDown.has('W')) { dx += fwdX; dz += fwdZ }
  if (keysDown.has('s') || keysDown.has('S')) { dx -= fwdX; dz -= fwdZ }
  if (keysDown.has('a') || keysDown.has('A')) { dx -= rgtX; dz -= rgtZ }
  if (keysDown.has('d') || keysDown.has('D')) { dx += rgtX; dz += rgtZ }

  const len = Math.sqrt(dx * dx + dz * dz)
  if (len > 0) {
    camera.position.x += (dx / len) * WALK_SPEED * dt
    camera.position.z += (dz / len) * WALK_SPEED * dt
    camera.position.y = WALK_EYE_Y
  }

  applyWalkLook()
}

// ---------------------------------------------------------------------------
// View broadcasting (Walk mode only)
// ---------------------------------------------------------------------------
function positionChanged(a, b) {
  if (!a || !b) return true
  return Math.abs(a[0] - b[0]) > VIEW_THRESHOLD
      || Math.abs(a[1] - b[1]) > VIEW_THRESHOLD
      || Math.abs(a[2] - b[2]) > VIEW_THRESHOLD
}

function broadcastView() {
  if (!wsConnected || !myServerId) return
  const pos = camera.position.toArray()
  if (!positionChanged(pos, lastBroadcastPos)) return
  sendMessage({ type: 'view', position: pos })
  lastBroadcastPos = [...pos]
}

// ---------------------------------------------------------------------------
// Avatar rendering (pure Three.js, not in glTF Document)
// ---------------------------------------------------------------------------
function colorFromId(id) {
  let hash = 0
  for (const char of id) hash = (hash * 31 + char.charCodeAt(0)) & 0xffffffff
  const hue = (hash & 0xffff) / 0xffff
  return new THREE.Color().setHSL(hue, 0.7, 0.5)
}

function createAvatar(id) {
  const color = colorFromId(id)
  const mat = new THREE.MeshLambertMaterial({ color })
  const group = new THREE.Group()

  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 1.0), mat)
  body.position.set(0, 1.2, 0)
  group.add(body)

  const capBottom = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 8), mat)
  capBottom.position.set(0, 0.7, 0)
  group.add(capBottom)

  const capTop = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 8), mat)
  capTop.position.set(0, 1.7, 0)
  group.add(capTop)

  // ConeGeometry tip is +Y by default; rotate X by PI/2 so tip points in -Z
  const nose = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 8), mat)
  nose.position.set(0, 1.5, -0.3)
  nose.rotation.x = Math.PI / 2
  group.add(nose)

  return group
}

function disposeAvatar(group) {
  threeScene.remove(group)
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose()
    if (obj.material) obj.material.dispose()
  })
}

function clearAllAvatars() {
  for (const group of avatars.values()) disposeAvatar(group)
  avatars.clear()
}

// ---------------------------------------------------------------------------
// Animate loop
// ---------------------------------------------------------------------------
function animate() {
  requestAnimationFrame(animate)

  const now = performance.now()
  const dt = Math.min((now - lastFrameTime) / 1000, 0.1)
  lastFrameTime = now

  if (cameraMode === 'orbit') {
    controls.update()
  } else {
    updateWalk(dt)
    broadcastView()
  }

  renderer.render(threeScene, camera)
}
animate()

// ---------------------------------------------------------------------------
// glTF scene loading
// ---------------------------------------------------------------------------
async function loadScene(gltfPath) {
  overlayEl.textContent = 'Loading…'
  try {
    const io = new WebIO().registerExtensions(KHRONOS_EXTENSIONS)
    gltfDoc = await io.read(gltfPath)
    som = new SOMDocument(gltfDoc)
    window.som = som
    docView = new DocumentView(gltfDoc)
    const sceneDef = gltfDoc.getRoot().listScenes()[0]
    const group = docView.view(sceneDef)
    threeScene.add(group)
    overlayEl.textContent = ''
    setStatus('', 'Offline')
    logInfo('Scene loaded: ' + gltfPath)
  } catch (err) {
    overlayEl.textContent = 'Scene load failed'
    setStatus('', 'Offline')
    logInfo('Scene load error: ' + err.message, true)
  }
}

async function loadManifest() {
  try {
    const res = await fetch(MANIFEST_PATH)
    if (res.ok) return await res.json()
  } catch {}
  return null
}

async function init() {
  setStatus('', 'Loading…')
  const manifest = await loadManifest()
  let gltfPath = FALLBACK_GLTF_PATH
  let serverUrl = 'ws://localhost:3000'
  if (manifest) {
    const manifestUrl = new URL(MANIFEST_PATH, window.location.href)
    if (manifest.world?.gltf)   gltfPath  = new URL(manifest.world.gltf,   manifestUrl).href
    if (manifest.world?.server) serverUrl = new URL(manifest.world.server, manifestUrl).href
  }
  urlInput.value = serverUrl
  await loadScene(gltfPath)
}

// ---------------------------------------------------------------------------
// SOP → Document mutations (via SOM)
// ---------------------------------------------------------------------------
function applySet(msg) {
  const node = som.getNodeByName(msg.node)
  if (!node) return
  try {
    som.setPath(node, msg.field, msg.value)
  } catch (e) {
    console.warn('applySet failed:', e.message)
  }
}

function applyAdd(msg) {
  const node = som.createNode(msg.node)
  som.scene.addChild(node)
}

function applyRemove(msg) {
  const node = som.getNodeByName(msg.node)
  if (node) node.dispose()
}

// ---------------------------------------------------------------------------
// Connection / message handlers
// ---------------------------------------------------------------------------
function setStatus(state, text) {
  statusDot.className = 'status-dot' + (state ? ' ' + state : '')
  statusText.textContent = text
}

function connect() {
  const url = urlInput.value.trim()
  setStatus('connecting', 'Connecting…')
  ws = new WebSocket(url)

  ws.addEventListener('open', () => {
    wsConnected = true
    btnConnect.disabled = true
    btnDisconnect.disabled = false
    btnSend.disabled = false
    sendMessage({ type: 'hello', id: clientId, capabilities: { tick: { interval: 1000 } } })
  })

  ws.addEventListener('message', ev => {
    let msg
    try { msg = JSON.parse(ev.data) } catch { return }
    logMessage('inbound', msg)
    switch (msg.type) {
      case 'hello':  onServerHello(msg);  break
      case 'set':    applySet(msg);       break
      case 'add':    applyAdd(msg);       break
      case 'remove': applyRemove(msg);    break
      case 'join':   onJoin(msg);         break
      case 'leave':  onLeave(msg);        break
      case 'view':   onView(msg);         break
      case 'tick':   /* filtered in log */ break
      case 'error':  onError(msg);        break
    }
  })

  ws.addEventListener('close', () => {
    wsConnected = false
    myServerId = null
    lastBroadcastPos = null
    clearAllAvatars()
    setStatus('', 'Offline')
    btnConnect.disabled = false
    btnDisconnect.disabled = true
    btnSend.disabled = true
    ws = null
  })

  ws.addEventListener('error', () => {
    setStatus('error', 'Error')
  })
}

function disconnect() {
  ws?.close()
}

function sendMessage(msgObj) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return
  ws.send(JSON.stringify(msgObj))
  logMessage('outbound', msgObj)
}

function onServerHello(msg) {
  myServerId = msg.id
  setStatus('connected', 'Connected  id:' + msg.id)
}

function onJoin(msg) {
  if (msg.id === myServerId) return
  const group = createAvatar(msg.id)
  if (msg.position) group.position.set(...msg.position)
  threeScene.add(group)
  avatars.set(msg.id, group)
  logInfo('peer joined: ' + msg.id)
}

function onLeave(msg) {
  const group = avatars.get(msg.id)
  if (group) {
    disposeAvatar(group)
    avatars.delete(msg.id)
  }
  logInfo('peer left: ' + msg.id)
}

function onView(msg) {
  if (msg.id === myServerId) return
  const group = avatars.get(msg.id)
  if (!group) return
  group.position.set(...msg.position)
}

function onError(msg) {
  logMessage('inbound', msg, true)
}

// ---------------------------------------------------------------------------
// Editor
// ---------------------------------------------------------------------------
typeSelect.addEventListener('change', () => {
  const tmpl = TEMPLATES[typeSelect.value]
  if (tmpl) editor.value = tmpl()
  validateEditor()
})

editor.addEventListener('input', validateEditor)

function validateEditor() {
  try {
    JSON.parse(editor.value)
    editor.classList.remove('error')
    editorError.textContent = ''
    return true
  } catch (e) {
    editor.classList.add('error')
    editorError.textContent = e.message
    return false
  }
}

editor.value = TEMPLATES[typeSelect.value]()
validateEditor()

btnSend.addEventListener('click', () => {
  if (!validateEditor()) return
  const msg = JSON.parse(editor.value)
  if (msg.type === 'ping') msg.clientTime = Date.now()
  sendMessage(msg)
})

btnReset.addEventListener('click', () => {
  const tmpl = TEMPLATES[typeSelect.value]
  if (tmpl) editor.value = tmpl()
  validateEditor()
})

// ---------------------------------------------------------------------------
// Log
// ---------------------------------------------------------------------------
function logMessage(dir, msg, isError = false) {
  const entry = { dir, msg, ts: new Date(), isError }
  logEntries.push(entry)

  const row = document.createElement('div')
  row.className = 'log-entry ' + dir + (isError ? ' error-entry' : '')
  entry.row = row

  if (msg.type === 'tick' && !chkShowTicks.checked) row.style.display = 'none'
  if (msg.type === 'view' && !chkShowViews.checked) row.style.display = 'none'

  const summary = document.createElement('div')
  summary.className = 'log-summary'

  const ts = document.createElement('span')
  ts.className = 'log-ts'
  ts.textContent = entry.ts.toTimeString().slice(0, 8)

  const dirEl = document.createElement('span')
  dirEl.className = 'log-dir ' + (dir === 'outbound' ? 'out' : 'in')
  dirEl.textContent = dir === 'outbound' ? '→' : '←'

  const typeEl = document.createElement('span')
  typeEl.className = 'log-type'
  typeEl.textContent = msg.type ?? '?'

  const detail = document.createElement('span')
  detail.className = 'log-detail'
  detail.textContent = formatDetail(msg)

  summary.append(ts, dirEl, typeEl, detail)

  const body = document.createElement('pre')
  body.className = 'log-body'
  body.textContent = JSON.stringify(msg, null, 2)

  row.append(summary, body)
  row.addEventListener('click', () => row.classList.toggle('expanded'))

  logEl.appendChild(row)
  logEl.scrollTop = logEl.scrollHeight
}

function logInfo(text, isError = false) {
  const row = document.createElement('div')
  row.className = 'log-entry inbound' + (isError ? ' error-entry' : '')
  const summary = document.createElement('div')
  summary.className = 'log-summary'
  const ts = document.createElement('span')
  ts.className = 'log-ts'
  ts.textContent = new Date().toTimeString().slice(0, 8)
  const detail = document.createElement('span')
  detail.className = 'log-detail'
  detail.style.color = isError ? '#f87171' : '#64748b'
  detail.textContent = '  ' + text
  summary.append(ts, detail)
  row.appendChild(summary)
  logEl.appendChild(row)
  logEl.scrollTop = logEl.scrollHeight
}

function formatDetail(msg) {
  switch (msg.type) {
    case 'set':    return `  ${msg.node}.${msg.field}  ${JSON.stringify(msg.value)}`
    case 'send':   return `  ${msg.node}.${msg.field}  ${JSON.stringify(msg.value)}`
    case 'add':    return `  ${msg.node?.name ?? msg.node}`
    case 'remove': return `  ${msg.node}`
    case 'join':   return `  id:${msg.id ?? ''}`
    case 'leave':  return `  id:${msg.id ?? ''}`
    case 'hello':  return `  id:${msg.id ?? ''}`
    case 'error':  return `  ${msg.code}: ${msg.message}`
    case 'tick':   return `  seq:${msg.seq}`
    case 'view':   return `  id:${msg.id ?? ''}  [${msg.position?.map(v => v.toFixed(2)).join(', ')}]`
    default:       return ''
  }
}

chkShowTicks.addEventListener('change', () => {
  const show = chkShowTicks.checked
  for (const e of logEntries) {
    if (e.row && e.msg?.type === 'tick') e.row.style.display = show ? '' : 'none'
  }
})

chkShowViews.addEventListener('change', () => {
  const show = chkShowViews.checked
  for (const e of logEntries) {
    if (e.row && e.msg?.type === 'view') e.row.style.display = show ? '' : 'none'
  }
})

btnClear.addEventListener('click', () => {
  logEntries.length = 0
  logEl.innerHTML = ''
})

// ---------------------------------------------------------------------------
// Wiring
// ---------------------------------------------------------------------------
btnConnect.addEventListener('click', connect)
btnDisconnect.addEventListener('click', disconnect)

init()
</script>
</body>
</html>
